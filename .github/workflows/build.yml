name: App-Bundle

# Packt bei jedem Stand das offline-lauffähige Ordner-Bundle (DB-Tool mit
# PGlite/WASM lässt sich nicht in eine Einzeldatei pressen) und legt es als
# Artifact ab. Artifacts sind nur für Repo-Mitglieder herunterladbar — keine
# öffentliche Verteilung der lizenzierten Schriften/Logos.
# Zum Testen: Run öffnen -> Artifact "ausbildungsberatung-suite-bundle" laden ->
# entpacken -> im Ordner einen lokalen Server starten
# (python3 -m http.server 8000) und http://localhost:8000/ öffnen.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Galabau-Notenlogik testen
        run: node tools/test_galabau.mjs
      - name: Ablaufplan-Rotationslogik testen
        run: node tools/test_ablauf.mjs
      - name: Bundle packen
        run: |
          mkdir -p dist
          zip -r -q dist/ausbildungsberatung-suite-bundle.zip \
            index.html bw-theme.css site.webmanifest assets \
            -x '*/.DS_Store'
          echo "Inhalt:" && unzip -l dist/ausbildungsberatung-suite-bundle.zip | tail -n 3
      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ausbildungsberatung-suite-bundle
          path: dist/ausbildungsberatung-suite-bundle.zip
          if-no-files-found: error
          retention-days: 30
