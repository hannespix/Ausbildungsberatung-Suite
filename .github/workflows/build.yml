name: Single-File-Build

# Baut bei jedem Stand die offline-lauffähige Einzeldatei (dist/index.html)
# und legt sie als Artifact ab. Artifacts sind nur für Repo-Mitglieder
# herunterladbar — keine öffentliche Verteilung der lizenzierten Schriften/Logos.
# Zum Testen: Run öffnen -> Artifact "ausbildungsberatung-suite-singlefile"
# laden -> entpacken -> index.html per Doppelklick öffnen (offline lauffähig).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Einzeldatei bauen
        run: python3 tools/build_singlefile.py
      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ausbildungsberatung-suite-singlefile
          path: dist/index.html
          if-no-files-found: error
          retention-days: 30
