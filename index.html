<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ausbildungsberatung-Suite — RP Freiburg</title>
<meta name="description" content="Interne Werkzeug-Suite der Ausbildungsberatung des Regierungspräsidiums Freiburg.">

<!-- Favicons / PWA -->
<link rel="icon" href="assets/favicons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
<link rel="apple-touch-icon" href="assets/favicons/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#FFFC00">

<link rel="stylesheet" href="bw-theme.css">
</head>
<body>
<a class="bw-skip-link" href="#inhalt">Zum Inhalt springen</a>

<!-- Kopf mit responsiver Navigation (Hamburger unterhalb 800px) -->
<header style="position:relative;background:var(--bw-weiss);border-bottom:var(--bw-border)">
  <div class="bw-app" style="padding-block:var(--bw-space-2)">
    <nav class="bw-nav" aria-label="Hauptnavigation">
      <a class="bw-nav__brand" href="#/">
        <img class="bw-logo" src="assets/logo/rpf-logo.png"
             alt="Regierungspräsidium Freiburg, Baden-Württemberg">
      </a>

      <div class="bw-nav__panel" id="hauptmenue">
        <ul class="bw-nav__links" id="navlinks"><!-- von app.js befüllt --></ul>
      </div>

      <div class="bw-nav__actions">
        <button class="bw-iconbtn" type="button" aria-label="Schnellsuche öffnen"
                title="Schnellsuche (Taste /)" onclick="location.hash='#/suche';">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="bw-iconbtn bw-nav__toggle" type="button"
                data-nav-toggle aria-controls="hauptmenue" aria-expanded="false" aria-label="Menü">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </nav>
  </div>
</header>

<div class="bw-app">
  <p id="db-status" class="bw-hinweis" hidden></p>
  <p id="meldung" role="status" aria-live="polite" hidden></p>
  <main id="inhalt" tabindex="-1">
    <div id="app">
      <noscript>Dieses Werkzeug benötigt JavaScript.</noscript>
    </div>
  </main>
</div>

<footer class="bw-footer">
  <div class="bw-app" style="padding:0;display:flex;align-items:center;justify-content:space-between;gap:var(--bw-space-3)">
    <img class="bw-logo bw-logo--neg" src="assets/logo/rpf-logo-negativ.png"
         alt="Regierungspräsidium Freiburg" style="display:block">
    <span class="bw-klein bw-footer__rechtslinks">
      <a href="#/impressum">Impressum</a> ·
      <a href="#/barrierefreiheit">Barrierefreiheit</a> ·
      <a href="#/datenschutz">Datenschutz</a>
    </span>
  </div>
</footer>

<!-- Klassische Helfer (setzen window-Globals) -->
<script src="assets/js/nav.js"></script>
<script src="assets/js/chart.js"></script>
<script src="assets/js/search.js"></script>
<!-- Anwendung (ES-Modul, lädt PGlite lokal) -->
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
